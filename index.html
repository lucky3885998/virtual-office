<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>纳灵虚拟办公室 - 数字企业3D看板</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
      body { font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif; background: #09090b; }
      /* 移动端安全区域 */
      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
      /* 启动画面 */
      .app-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #09090b 0%, #18181b 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .app-splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .app-splash-logo {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px;
        box-shadow: 0 0 60px rgba(59,130,246,0.4);
        animation: splashPulse 2s ease-in-out infinite;
      }
      .app-splash-text { font-size: 14px; color: #71717a; font-weight: 500; }
      @keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- 启动画面 -->
      <div class="app-splash" id="app-splash">
        <div class="app-splash-logo">🏢</div>
        <div class="app-splash-text">正在加载虚拟办公室...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 启动画面延迟隐藏
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('app-splash')?.classList.add('hidden')
        }, 800)
      })
    </script>
  </body>
</html>
