# ============================================
# 网络定义
# ============================================
networks:
  office-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================
# 数据卷
# ============================================
volumes:
  office-data:
    driver: local
